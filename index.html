<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>クレカッち</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-solid: #ffffff;
      --surface-strong: #f1f4f8;
      --ink: #1d1d1f;
      --muted: #6e6e73;
      --line: rgba(62, 72, 87, 0.14);
      --line-strong: rgba(62, 72, 87, 0.26);
      --teal: #0a84ff;
      --teal-dark: #0064c8;
      --gold: #a76a18;
      --red: #b84a48;
      --green: #27744f;
      --shadow: 0 18px 48px rgba(31, 35, 42, 0.09);
      --radius: 8px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, #fbfcff 0%, #f4f7fb 48%, #edf2f8 100%);
      color: var(--ink);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 24px;
      background: rgba(251, 252, 255, 0.74);
      border-bottom: 1px solid rgba(62, 72, 87, 0.12);
      backdrop-filter: blur(22px) saturate(1.6);
      -webkit-backdrop-filter: blur(22px) saturate(1.6);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: linear-gradient(145deg, #0a84ff, #35c2a7);
      color: #ffffff;
      font-weight: 850;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35), 0 8px 18px rgba(10, 132, 255, 0.22);
    }

    h1 {
      margin: 0;
      font-size: 19px;
      font-weight: 780;
      letter-spacing: 0;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .button {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      padding: 8px 12px;
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.74);
      border: 1px solid var(--line);
      font-weight: 700;
      white-space: nowrap;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.72), 0 8px 20px rgba(31, 35, 42, 0.04);
    }

    .button:hover {
      border-color: var(--line-strong);
      background: #ffffff;
    }

    .preset-picker {
      min-height: 38px;
      width: min(290px, 100%);
      flex: 0 1 290px;
      padding: 8px 34px 8px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.82);
      font: inherit;
      font-weight: 700;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.68);
    }

    .button.primary {
      color: #ffffff;
      background: var(--teal);
      border-color: rgba(10, 132, 255, 0.2);
      box-shadow: 0 10px 24px rgba(10, 132, 255, 0.2);
    }

    .button.primary:hover {
      background: var(--teal-dark);
    }

    .button.danger {
      color: var(--red);
      background: #fff4f3;
    }

    .icon-button {
      width: 38px;
      height: 38px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid var(--line);
      font-weight: 900;
    }

    .icon-button:hover {
      border-color: var(--line-strong);
      background: #e4edf1;
    }

    .shell {
      width: min(1440px, 100%);
      margin: 0 auto;
      padding: 22px 24px 36px;
      display: grid;
      grid-template-columns: minmax(320px, 420px) minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px) saturate(1.35);
      -webkit-backdrop-filter: blur(18px) saturate(1.35);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 15px 18px;
      border-bottom: 1px solid var(--line);
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      font-weight: 780;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 18px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .form-grid.single {
      grid-template-columns: 1fr;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 760;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 40px;
      padding: 9px 10px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid var(--line);
      border-radius: 8px;
      outline: none;
      box-shadow: inset 0 1px 1px rgba(31, 35, 42, 0.03);
    }

    textarea {
      min-height: 78px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(10, 132, 255, 0.14);
    }

    .range-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      margin-top: 4px;
    }

    .range-row output {
      min-width: 44px;
      text-align: right;
      color: var(--ink);
      font-weight: 760;
    }

    input[type="range"] {
      padding: 0;
      min-height: 24px;
      accent-color: var(--teal);
    }

    .mode-switch {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line-strong);
      border-radius: 8px;
      background: rgba(232, 236, 242, 0.72);
    }

    .mode-switch input {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .mode-switch span {
      min-height: 34px;
      display: grid;
      place-items: center;
      padding: 6px 8px;
      border-radius: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 820;
      text-align: center;
      white-space: nowrap;
    }

    .mode-switch label {
      display: block;
      gap: 0;
      color: inherit;
      cursor: pointer;
    }

    .mode-switch input:checked + span {
      color: #ffffff;
      background: var(--teal);
      box-shadow: 0 8px 18px rgba(10, 132, 255, 0.22);
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      padding: 12px;
      background: var(--surface-strong);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
    }

    .metric small {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 760;
      white-space: nowrap;
    }

    .metric strong {
      display: block;
      margin-top: 3px;
      font-size: 18px;
      overflow-wrap: anywhere;
    }

    .results {
      display: grid;
      gap: 12px;
    }

    .result-card {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) minmax(112px, 148px) auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border: 1px solid rgba(10, 132, 255, 0.15);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 10px 24px rgba(24, 34, 47, 0.06);
    }

    .result-card.best {
      border-color: rgba(10, 132, 255, 0.38);
      background: linear-gradient(90deg, rgba(255, 255, 255, 0.94) 0%, rgba(244, 249, 255, 0.94) 58%, rgba(255, 250, 237, 0.94) 100%);
      box-shadow: 0 18px 40px rgba(10, 132, 255, 0.13);
    }

    .rank {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      color: #ffffff;
      background: var(--teal);
      font-weight: 850;
    }

    .result-main {
      min-width: 0;
    }

    .result-title {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin: 0 0 4px;
      font-size: 16px;
      font-weight: 800;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #e8eef3;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .tag.green {
      color: var(--green);
      background: #eaf5ef;
    }

    .tag.gold {
      color: var(--gold);
      background: #fbf1df;
    }

    .tag.red {
      color: var(--red);
      background: #faeeee;
    }

    .facts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .days-hero {
      min-height: 94px;
      display: grid;
      place-items: center;
      padding: 10px;
      border-radius: 8px;
      background: #fff1c7;
      border: 1px solid #edcf79;
      color: #714b05;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.48);
    }

    .days-hero small {
      display: block;
      font-size: 11px;
      font-weight: 860;
      white-space: nowrap;
    }

    .days-hero strong {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 3px;
      margin-top: 2px;
      color: #8c5700;
      line-height: 1;
      letter-spacing: 0;
    }

    .days-hero .days-number {
      font-size: 36px;
      font-weight: 920;
    }

    .days-hero .days-unit {
      font-size: 17px;
      font-weight: 900;
    }

    .days-hero span {
      display: block;
      margin-top: 5px;
      color: var(--teal-dark);
      font-size: 11px;
      font-weight: 820;
      white-space: nowrap;
    }

    .score {
      text-align: right;
      min-width: 88px;
    }

    .score strong {
      display: block;
      font-size: 22px;
      color: var(--teal);
    }

    .score small {
      color: var(--muted);
      font-weight: 760;
    }

    .cards-panel {
      grid-column: 1 / -1;
    }

    .card-list {
      display: grid;
      gap: 12px;
    }

    .card-editor {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 42px;
      gap: 10px;
      align-items: end;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.86);
      box-shadow: 0 8px 20px rgba(31, 35, 42, 0.04);
    }

    .card-editor .wide {
      min-width: 140px;
    }

    .card-editor .delete-slot {
      grid-column: 2;
      grid-row: 1;
    }

    .card-details {
      grid-column: 1 / -1;
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .card-details summary {
      min-height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      cursor: pointer;
      color: var(--teal-dark);
      font-weight: 820;
      list-style: none;
    }

    .card-details summary::-webkit-details-marker {
      display: none;
    }

    .card-details summary::after {
      content: "+";
      width: 28px;
      height: 28px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #e7f2f4;
      color: var(--teal);
      font-weight: 900;
      flex: 0 0 auto;
    }

    .card-details[open] summary::after {
      content: "-";
    }

    .detail-meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 720;
      overflow-wrap: anywhere;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(112px, 1fr));
      gap: 10px;
      margin-top: 8px;
      align-items: end;
    }

    .detail-grid textarea,
    .detail-grid .preset-note {
      grid-column: 1 / -1;
    }

    .preset-note {
      grid-column: 1 / -1;
      padding: 9px 10px;
      border-radius: 8px;
      border: 1px solid rgba(10, 132, 255, 0.18);
      background: #f3f8ff;
      color: var(--teal-dark);
      font-size: 12px;
      font-weight: 720;
      overflow-wrap: anywhere;
    }

    .footer-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 12px;
    }

    .empty {
      padding: 22px;
      border: 1px dashed var(--line-strong);
      border-radius: 8px;
      color: var(--muted);
      background: #fbfcfd;
      text-align: center;
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1380px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .detail-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .topbar {
        position: static;
        align-items: flex-start;
        padding: 12px;
      }

      .top-actions {
        width: 100%;
      }

      .button {
        flex: 1 1 auto;
      }

      .preset-picker {
        flex: 1 1 100%;
        width: 100%;
      }

      .shell {
        padding: 12px;
        gap: 12px;
      }

      .panel-header,
      .panel-body {
        padding: 14px;
      }

      .form-grid,
      .summary-strip {
        grid-template-columns: 1fr;
      }

      .result-card {
        grid-template-columns: auto minmax(0, 1fr);
      }

      .days-hero {
        grid-column: 1 / -1;
        min-height: 78px;
        grid-template-columns: 1fr;
      }

      .days-hero .days-number {
        font-size: 42px;
      }

      .score {
        grid-column: 1 / -1;
        text-align: left;
        padding-left: 0;
      }

      .card-details summary {
        align-items: flex-start;
        flex-direction: column;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">¥</div>
        <h1>クレカッち</h1>
      </div>
      <div class="top-actions">
        <button class="button primary" id="addCardButton" type="button">手入力追加</button>
        <select class="preset-picker" id="presetSelect" aria-label="追加するカードを選択">
          <option value="">カードを選択</option>
        </select>
        <button class="button primary" id="addPresetCardButton" type="button">選択カード追加</button>
        <button class="button" id="addDefaultCardsButton" type="button">標準カード追加</button>
        <button class="button" id="applyPresetsButton" type="button">公式反映</button>
        <button class="button" id="exportButton" type="button">JSON書出</button>
        <label class="button" for="importFile">JSON読込</label>
        <input class="hidden" id="importFile" type="file" accept="application/json,.json">
        <button class="button danger" id="resetButton" type="button">初期化</button>
      </div>
    </header>

    <main class="shell">
      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">今回の決済</h2>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <label>
              決済日
              <input id="txDate" type="date">
            </label>
            <label>
              金額
              <input id="amount" type="number" min="0" step="1" inputmode="numeric">
            </label>
            <label>
              種別
              <select id="category">
                <option value="normal">通常</option>
                <option value="tax">税金</option>
                <option value="gasoline">ガソリン</option>
                <option value="etc">ETC</option>
                <option value="online">オンライン</option>
                <option value="travel">旅行・交通</option>
                <option value="business">事業経費</option>
              </select>
            </label>
          </div>

          <div class="form-grid single" style="margin-top: 16px;">
            <label>
              判定モード
              <span class="mode-switch" id="priorityMode">
                <label><input type="radio" name="priorityMode" value="points"><span>ポイント重視</span></label>
                <label><input type="radio" name="priorityMode" value="balanced" checked><span>バランス</span></label>
                <label><input type="radio" name="priorityMode" value="days"><span>支払い日重視</span></label>
              </span>
            </label>
            <label>
              支払い猶予の重み
              <span class="range-row">
                <input id="cashWeight" type="range" min="0" max="100" step="5" value="50">
                <output id="cashWeightOutput">50</output>
              </span>
            </label>
            <label>
              実質メリットの重み
              <span class="range-row">
                <input id="benefitWeight" type="range" min="0" max="100" step="5" value="50">
                <output id="benefitWeightOutput">50</output>
              </span>
            </label>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">おすすめ順</h2>
        </div>
        <div class="panel-body">
          <div class="summary-strip" id="summaryStrip"></div>
          <div class="results" id="results"></div>
        </div>
      </section>

      <section class="panel cards-panel">
        <div class="panel-header">
          <h2 class="panel-title">カード設定</h2>
        </div>
        <div class="panel-body">
          <div class="card-list" id="cardList"></div>
          <div class="footer-note">付与率は100円あたりのポイント数です。税金手数料は自治体・支払いサイト側の手数料を入れてください。ガソリン・ETCでポイント対象外のカードは付与率を0にします。スコアは入力値からの比較用です。</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "card-picker-state-v1";
    const RETIRED_CARDS_MIGRATION_KEY = "card-picker-retired-cards-v1";
    const retiredCardKeys = [
      "marriottbonvoyamexプレミアム",
      "marriottbonvoypremium",
      "amexマリオットボンボイプレミアム",
      "アメックスマリオットボンボイプレミアム",
      "マリオットボンボイプレミアム",
      "マリオットボンヴォイプレミアム"
    ];

    const defaultCards = [
      {
        name: "Marriott Bonvoy AMEX（19日締め）",
        closeDay: 19,
        payMonthOffset: 1,
        payDay: 10,
        pointValue: 1,
        rewardRate: 2,
        taxRewardRate: 0.5,
        gasolineRewardRate: 0.5,
        etcRewardRate: 0.5,
        taxFeeRate: 0.82,
        limit: 0,
        used: 0,
        memo: "多いパターン: 19日締め・翌月10日払い。ほかに1日前後締め・当月21日払い、5日前後締め・当月26日払いがあります。事業用支払いとみなされるとポイント対象外になる場合があります。"
      }
    ];

    const cardPresets = [
      {
        id: "amex-marriott-bonvoy",
        label: "Marriott Bonvoy AMEX（19日締め/翌月10日払い）",
        aliases: [
          "amexマリオットボンボイ",
          "amexmarriottbonvoy",
          "アメックスマリオットボンボイ",
          "アメックスmarriottbonvoy",
          "marriottbonvoyamex",
          "Marriott Bonvoy AMEX",
          "マリオットボンボイカード",
          "marriottbonvoycard",
          "マリオットボンヴォイカード"
        ],
        values: {
          closeDay: 19,
          payMonthOffset: 1,
          payDay: 10,
          pointValue: 1,
          rewardRate: 2,
          taxRewardRate: 0.5,
          gasolineRewardRate: 0.5,
          etcRewardRate: 0.5
        },
        note: "多いパターンとして19日締め・翌月10日払いで入力しています。ほかに1日前後締め・当月21日払い、5日前後締め・当月26日払いがあります。通常100円=2 Marriott Bonvoyポイント、税金・ガソリン・ETCはカード種別や判定により異なるため必要に応じて調整してください。事業用支払いとみなされるとポイント対象外になる場合があります。"
      },
      {
        id: "amex-marriott-bonvoy-day1",
        label: "Marriott Bonvoy AMEX（1日締め/当月21日払い）",
        aliases: [
          "マリオットボンボイ1日締め",
          "マリオットボンボイ当月21日",
          "marriottbonvoyday1",
          "marriottbonvoy21"
        ],
        values: {
          closeDay: 1,
          payMonthOffset: 0,
          payDay: 21,
          pointValue: 1,

    const elements = {
      txDate: document.querySelector("#txDate"),
      amount: document.querySelector("#amount"),
      category: document.querySelector("#category"),
      priorityMode: document.querySelector("#priorityMode"),
      cashWeight: document.querySelector("#cashWeight"),
      benefitWeight: document.querySelector("#benefitWeight"),
      cashWeightOutput: document.querySelector("#cashWeightOutput"),
      benefitWeightOutput: document.querySelector("#benefitWeightOutput"),
      summaryStrip: document.querySelector("#summaryStrip"),
      results: document.querySelector("#results"),
      cardList: document.querySelector("#cardList"),
      addCardButton: document.querySelector("#addCardButton"),
      presetSelect: document.querySelector("#presetSelect"),
      addPresetCardButton: document.querySelector("#addPresetCardButton"),
      addDefaultCardsButton: document.querySelector("#addDefaultCardsButton"),
      applyPresetsButton: document.querySelector("#applyPresetsButton"),
      exportButton: document.querySelector("#exportButton"),
      importFile: document.querySelector("#importFile"),
      resetButton: document.querySelector("#resetButton")
    };

    let state = loadState();

    init();

    function init() {
      const migrated = applyRetiredCardMigration();
      if (!elements.txDate.value) {
        elements.txDate.value = toInputDate(new Date());
      }
      if (!elements.amount.value) {
        elements.amount.value = 10000;
      }
      renderPresetSelect();
      bindInputs();
      render();
      if (migrated) {
        saveState();
      }
    }

    function bindInputs() {
      ["txDate", "amount", "category", "cashWeight", "benefitWeight"].forEach((key) => {
        elements[key].addEventListener("input", () => {
          if (key === "cashWeight" || key === "benefitWeight") {
            setPriorityMode("custom");
          }
          renderResults();
          saveState();
        });
      });

      elements.priorityMode.addEventListener("change", (event) => {
        if (!event.target.matches("input[name='priorityMode']")) return;
        applyPriorityMode(event.target.value);
        renderResults();
        saveState();
      });

      elements.addCardButton.addEventListener("click", () => {
        state.cards.push({
          id: crypto.randomUUID(),
          name: "新しいカード",
          closeDay: 31,
          payMonthOffset: 1,
          payDay: 27,
          pointValue: 1,
          rewardRate: 1,
          taxRewardRate: 0,
          gasolineRewardRate: 1,
          etcRewardRate: 1,
          taxFeeRate: 0.82,
          limit: 0,
          used: 0,
          memo: ""
        });
        render();
        saveState();
      });

      elements.addPresetCardButton.addEventListener("click", () => {
        const preset = cardPresets.find((item) => item.id === elements.presetSelect.value);
        if (!preset) {
          alert("追加するカードを選択してください。");
          return;
        }
        state.cards.push(cardFromPreset(preset));
        elements.presetSelect.value = "";
        render();
        saveState();
      });

      elements.addDefaultCardsButton.addEventListener("click", () => {
        const added = addDefaultCards();
        render();
        saveState();
        alert(added ? `${added}件の標準カードを追加しました。` : "標準カードはすでに入っています。");
      });

      elements.applyPresetsButton.addEventListener("click", () => {
        const applied = applyAllCardPresets();
        render();
        saveState();
        alert(applied ? `${applied}件のカードに公式情報を反映しました。` : "一致する公式プリセットがありませんでした。");
      });

      elements.exportButton.addEventListener("click", exportState);

      elements.importFile.addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const text = await file.text();
        const imported = JSON.parse(text);
        state = normalizeState(imported);
        render();
        saveState();
        elements.importFile.value = "";
      });

      elements.resetButton.addEventListener("click", () => {
        if (!confirm("カード設定と入力値を初期化しますか？")) return;
        localStorage.removeItem(STORAGE_KEY);
        state = normalizeState({});
        elements.txDate.value = toInputDate(new Date());
        elements.amount.value = 10000;
        elements.category.value = "normal";
        setPriorityMode("balanced");
        applyPriorityMode("balanced");
        render();
        saveState();
      });
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return normalizeState(saved);
      } catch {
        return normalizeState({});
      }
    }

    function normalizeState(input) {
      const cards = Array.isArray(input.cards) && input.cards.length ? input.cards : defaultCards;
      return {
        cards: cards.map((card) => ({
          id: card.id || crypto.randomUUID(),
          name: String(card.name || "カード"),
          closeDay: toNumber(card.closeDay, 31),
          payMonthOffset: toNumber(card.payMonthOffset, 1),
          payDay: toNumber(card.payDay, 27),
          pointValue: toNumber(card.pointValue, 1),
          rewardRate: toNumber(card.rewardRate, 1),
          taxRewardRate: toNumber(card.taxRewardRate, 0),
          gasolineRewardRate: toNumber(card.gasolineRewardRate, toNumber(card.rewardRate, 1)),
          etcRewardRate: toNumber(card.etcRewardRate, toNumber(card.rewardRate, 1)),
          taxFeeRate: toNumber(card.taxFeeRate, 0),
          limit: toNumber(card.limit, 0),
          used: toNumber(card.used, 0),
          memo: String(card.memo || "")
        }))
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function applyRetiredCardMigration() {
      if (localStorage.getItem(RETIRED_CARDS_MIGRATION_KEY) === "done") return false;
      const before = state.cards.length;
      state.cards = state.cards.filter((card) => !isRetiredCardName(card.name));
      localStorage.setItem(RETIRED_CARDS_MIGRATION_KEY, "done");
      return state.cards.length !== before;
    }

    function isRetiredCardName(name) {
      const normalized = normalizeCardName(name);
      return retiredCardKeys.some((key) => normalized.includes(normalizeCardName(key)));
    }

    function renderPresetSelect() {
      elements.presetSelect.innerHTML = [
        '<option value="">カードを選択</option>',
        ...cardPresets.map((preset) => `<option value="${escapeAttr(preset.id)}">${escapeHtml(preset.label)}</option>`)
      ].join("");
    }

    function addDefaultCards() {
      const existing = new Set(state.cards.map((card) => normalizeCardName(card.name)));
      let added = 0;
      defaultCards.forEach((card) => {
        const key = normalizeCardName(card.name);
        if (existing.has(key)) return;
        state.cards.push(cloneCard(card));
        existing.add(key);
        added += 1;
      });
      return added;
    }

    function cardFromPreset(preset) {
      return {
        id: crypto.randomUUID(),
        name: preset.label,
        ...preset.values,
        taxFeeRate: 0.82,
        limit: 0,
        used: 0,
        memo: `自動補完: ${preset.note}`
      };
    }

    function cloneCard(card) {
      return {
        ...card,
        id: crypto.randomUUID()
      };
    }

    function render() {
      renderCards();
      renderResults();
    }

    function renderCards() {
      elements.cardList.innerHTML = "";
      if (!state.cards.length) {
        elements.cardList.innerHTML = '<div class="empty">カードがありません</div>';
        return;
      }

      state.cards.forEach((card) => {
        const editor = document.createElement("div");
        editor.className = "card-editor";
        editor.dataset.id = card.id;
        editor.innerHTML = `
          <label class="wide">カード名<input data-field="name" type="text" value="${escapeAttr(card.name)}"></label>
          <button class="icon-button delete-slot" data-action="delete" type="button" title="削除">×</button>
          <details class="card-details">
            <summary>
              <span>詳細設定</span>
              <span class="detail-meta">締め ${card.closeDay}日 / 支払 ${monthOffsetLabel(card.payMonthOffset)}${card.payDay}日 / 通常 ${formatPointRate(card.rewardRate)}</span>
            </summary>
            <div class="detail-grid">
              <label>締め日<select data-field="closeDay">${dayOptions(card.closeDay)}</select></label>
              <label>支払月<select data-field="payMonthOffset">${monthOffsetOptions(card.payMonthOffset)}</select></label>
              <label>支払日<select data-field="payDay">${dayOptions(card.payDay)}</select></label>
              <label>1pt円換算<input data-field="pointValue" type="number" step="0.1" min="0" value="${card.pointValue}"></label>
              <label>通常付与率<input data-field="rewardRate" type="number" step="0.01" min="0" value="${card.rewardRate}"></label>
              <label>税金付与率<input data-field="taxRewardRate" type="number" step="0.01" min="0" value="${card.taxRewardRate}"></label>
              <label>ガソリン付与率<input data-field="gasolineRewardRate" type="number" step="0.01" min="0" value="${card.gasolineRewardRate}"></label>
              <label>ETC付与率<input data-field="etcRewardRate" type="number" step="0.01" min="0" value="${card.etcRewardRate}"></label>
              <label>税金手数料(%)<input data-field="taxFeeRate" type="number" step="0.01" min="0" value="${card.taxFeeRate}"></label>
              <label>利用枠(円)<input data-field="limit" type="number" step="1000" min="0" value="${card.limit}"></label>
              <label>利用済(円)<input data-field="used" type="number" step="1000" min="0" value="${card.used}"></label>
              <div class="preset-note hidden" data-preset-note></div>
              <textarea data-field="memo" placeholder="メモ">${escapeHtml(card.memo)}</textarea>
            </div>
          </details>
        `;
        updatePresetNote(editor, card.name);

        editor.addEventListener("input", (event) => {
          const field = event.target.dataset.field;
          if (!field) return;
          const target = state.cards.find((item) => item.id === card.id);
          if (!target) return;
          target[field] = event.target.type === "number" || event.target.tagName === "SELECT"
            ? toNumber(event.target.value, 0)
            : event.target.value;
          if (field === "name") {
            const preset = applyCardPreset(target);
            if (preset) {
              syncEditorInputs(editor, target);
            } else {
              updatePresetNote(editor, target.name);
            }
          }
          renderResults();
          saveState();
        });

        editor.addEventListener("click", (event) => {
          if (event.target.dataset.action !== "delete") return;
          state.cards = state.cards.filter((item) => item.id !== card.id);
          render();
          saveState();
        });

        elements.cardList.appendChild(editor);
      });
    }

    function applyCardPreset(card) {
      const preset = findCardPreset(card.name);
      if (!preset) return null;
      Object.assign(card, preset.values);
      if (!card.memo.trim() || card.memo.startsWith("自動補完:")) {
        card.memo = `自動補完: ${preset.note}`;
      }
      return preset;
    }

    function applyAllCardPresets() {
      let applied = 0;
      state.cards.forEach((card) => {
        if (applyCardPreset(card)) {
          applied += 1;
        }
      });
      return applied;
    }

    function findCardPreset(name) {
      const normalized = normalizeCardName(name);
      return cardPresets.find((preset) => {
        return [preset.label, ...preset.aliases].some((alias) => normalized.includes(normalizeCardName(alias)));
      }) || null;
    }

    function normalizeCardName(name) {
      return String(name || "")
        .normalize("NFKC")
        .toLowerCase()
        .replace(/[・\s　_-]+/g, "");
    }

    function syncEditorInputs(editor, card) {
      editor.querySelectorAll("[data-field]").forEach((input) => {
        const field = input.dataset.field;
        if (!(field in card)) return;
        input.value = card[field];
      });
      updatePresetNote(editor, card.name);
    }

    function updatePresetNote(editor, name) {
      const note = editor.querySelector("[data-preset-note]");
      if (!note) return;
      const preset = findCardPreset(name);
      if (!preset) {
        note.classList.add("hidden");
        note.textContent = "";
        return;
      }
      note.textContent = `${preset.label}: ${preset.note}`;
      note.classList.remove("hidden");
    }

    function renderResults() {
      elements.cashWeightOutput.textContent = elements.cashWeight.value;
      elements.benefitWeightOutput.textContent = elements.benefitWeight.value;

      const tx = getTransaction();
      const ranked = rankCards(tx);
      renderSummary(ranked, tx);

      elements.results.innerHTML = "";
      if (!ranked.length) {
        elements.results.innerHTML = '<div class="empty">カードを追加してください</div>';
        return;
      }

      ranked.forEach((item, index) => {
        const node = document.createElement("article");
        node.className = `result-card ${index === 0 && item.available ? "best" : ""}`;
        const taxTag = tx.category === "tax"
          ? `<span class="tag ${item.netBenefit >= 0 ? "green" : "red"}">税金 ${formatYen(item.netBenefit)}</span>`
          : "";
        const limitTag = item.available
          ? `<span class="tag green">利用可</span>`
          : `<span class="tag red">枠不足</span>`;
        node.innerHTML = `
          <div class="rank">${index + 1}</div>
          <div class="result-main">
            <p class="result-title">
              <span>${escapeHtml(item.card.name)}</span>
              ${index === 0 && item.available ? '<span class="tag gold">最有力</span>' : ""}
              ${limitTag}
              ${taxTag}
            </p>
            <div class="facts">
              <span>締め日 ${formatDate(item.closeDate)}</span>
              <span>支払日 ${formatDate(item.paymentDate)}</span>
              <span>決済日から${item.daysUntilPayment}日後</span>
              <span>${categoryLabel(tx.category)}付与率 ${formatPointRate(item.rewardRate)}</span>
              <span>1pt=${formatPointValue(item.pointValue)}</span>
              <span>獲得見込 ${formatPoints(item.pointsEarned)}</span>
              <span>還元 ${formatYen(item.rewardValue)}</span>
              <span>残枠 ${item.remainingLabel}</span>
            </div>
          </div>
          <div class="days-hero" aria-label="支払いまで${item.daysUntilPayment}日">
            <small>支払いまで</small>
            <strong><span class="days-number">${item.daysUntilPayment}</span><span class="days-unit">日</span></strong>
            <span>${formatDate(item.paymentDate)}予定</span>
          </div>
          <div class="score">
            <strong>${item.available ? Math.round(item.score) : "-"}</strong>
            <small>score</small>
          </div>
        `;
        elements.results.appendChild(node);
      });
    }

    function applyPriorityMode(mode) {
      const modes = {
        points: { cash: 20, benefit: 80 },
        balanced: { cash: 50, benefit: 50 },
        days: { cash: 80, benefit: 20 }
      };
      const weights = modes[mode];
      if (!weights) return;
      elements.cashWeight.value = weights.cash;
      elements.benefitWeight.value = weights.benefit;
      setPriorityMode(mode);
    }

    function setPriorityMode(mode) {
      const checked = elements.priorityMode.querySelector(`input[value="${mode}"]`);
      if (checked) {
        checked.checked = true;
        return;
      }
      elements.priorityMode.querySelectorAll("input").forEach((input) => {
        input.checked = false;
      });
    }

    function renderSummary(ranked, tx) {
      const best = ranked.find((item) => item.available) || ranked[0];
      if (!best) {
        elements.summaryStrip.innerHTML = "";
        return;
      }
      elements.summaryStrip.innerHTML = `
        <div class="metric"><small>候補</small><strong>${escapeHtml(best.card.name)}</strong></div>
        <div class="metric"><small>支払予定日</small><strong>${formatLongDate(best.paymentDate)}</strong></div>
        <div class="metric"><small>支払いまで</small><strong>${best.daysUntilPayment}日</strong></div>
        <div class="metric"><small>獲得見込</small><strong>${formatPoints(best.pointsEarned)}</strong></div>
        <div class="metric"><small>${tx.category === "tax" ? "税金実質" : "還元見込み"}</small><strong>${formatYen(tx.category === "tax" ? best.netBenefit : best.rewardValue)}</strong></div>
      `;
    }

    function getTransaction() {
      const amount = Math.max(0, toNumber(elements.amount.value, 0));
      return {
        date: parseInputDate(elements.txDate.value) || new Date(),
        amount,
        category: elements.category.value,
        cashWeight: toNumber(elements.cashWeight.value, 50),
        benefitWeight: toNumber(elements.benefitWeight.value, 50)
      };
    }

    function rankCards(tx) {
      const rows = state.cards.map((card) => {
        const closeDate = getCloseDate(tx.date, card.closeDay);
        const paymentDate = getPaymentDate(closeDate, card.payMonthOffset, card.payDay);
        const daysUntilPayment = Math.max(0, daysBetween(tx.date, paymentDate));
        const rate = getRewardRate(card, tx.category);
        const pointValue = Math.max(0, toNumber(card.pointValue, 1));
        const pointsEarned = tx.amount * (rate / 100);
        const rewardValue = pointsEarned * pointValue;
        const fee = tx.category === "tax" ? tx.amount * (card.taxFeeRate / 100) : 0;
        const netBenefit = rewardValue - fee;
        const remaining = card.limit > 0 ? card.limit - card.used - tx.amount : Infinity;
        const available = card.limit <= 0 || remaining >= 0;
        return {
          card,
          closeDate,
          paymentDate,
          daysUntilPayment,
          rewardRate: rate,
          pointValue,
          pointsEarned,
          rewardValue,
          fee,
          netBenefit,
          remaining,
          remainingLabel: Number.isFinite(remaining) ? formatYen(remaining) : "未設定",
          available
        };
      });

      const minDays = Math.min(...rows.map((row) => row.daysUntilPayment));
      const maxDays = Math.max(...rows.map((row) => row.daysUntilPayment));
      const minBenefit = Math.min(...rows.map((row) => row.netBenefit));
      const maxBenefit = Math.max(...rows.map((row) => row.netBenefit));
      const cashWeight = tx.cashWeight / 100;
      const benefitWeight = tx.benefitWeight / 100;
      const totalWeight = Math.max(0.01, cashWeight + benefitWeight);

      rows.forEach((row) => {
        const dayScore = normalize(row.daysUntilPayment, minDays, maxDays);
        const benefitScore = normalize(row.netBenefit, minBenefit, maxBenefit);
        const baseScore = ((dayScore * cashWeight) + (benefitScore * benefitWeight)) / totalWeight;
        row.score = row.available ? baseScore * 100 : -1;
      });

      return rows.sort((a, b) => {
        if (a.available !== b.available) return a.available ? -1 : 1;
        return b.score - a.score;
      });
    }

    function getCloseDate(date, closeDay) {
      const y = date.getFullYear();
      const m = date.getMonth();
      const current = dateAtDay(y, m, closeDay);
      if (stripTime(date) <= current) return current;
      return dateAtDay(y, m + 1, closeDay);
    }

    function getPaymentDate(closeDate, offset, payDay) {
      return dateAtDay(closeDate.getFullYear(), closeDate.getMonth() + offset, payDay);
    }

    function dateAtDay(year, monthIndex, day) {
      const base = new Date(year, monthIndex, 1);
      const last = new Date(base.getFullYear(), base.getMonth() + 1, 0).getDate();
      return new Date(base.getFullYear(), base.getMonth(), Math.min(Math.max(1, day), last));
    }

    function parseInputDate(value) {
      if (!value) return null;
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function toInputDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function stripTime(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function daysBetween(start, end) {
      const ms = stripTime(end) - stripTime(start);
      return Math.round(ms / 86400000);
    }

    function normalize(value, min, max) {
      if (!Number.isFinite(value)) return 0;
      if (max === min) return 1;
      return (value - min) / (max - min);
    }

    function dayOptions(selected) {
      const labels = Array.from({ length: 31 }, (_, index) => {
        const day = index + 1;
        const label = day === 31 ? "月末" : `${day}日`;
        return `<option value="${day}" ${Number(selected) === day ? "selected" : ""}>${label}</option>`;
      });
      return labels.join("");
    }

    function monthOffsetOptions(selected) {
      return [
        [0, "当月"],
        [1, "翌月"],
        [2, "翌々月"],
        [3, "3か月後"]
      ].map(([value, label]) => `<option value="${value}" ${Number(selected) === value ? "selected" : ""}>${label}</option>`).join("");
    }

    function monthOffsetLabel(value) {
      const labels = {
        0: "当月",
        1: "翌月",
        2: "翌々月",
        3: "3か月後"
      };
      return labels[Number(value)] || "翌月";
    }

    function formatDate(date) {
      return `${date.getMonth() + 1}/${date.getDate()}`;
    }

    function formatLongDate(date) {
      return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
    }

    function formatPointRate(value) {
      return `${Number(value).toLocaleString("ja-JP", { maximumFractionDigits: 2 })}pt/100円`;
    }

    function formatPoints(value) {
      const points = Math.max(0, Number(value) || 0);
      return `${points.toLocaleString("ja-JP", { maximumFractionDigits: 2 })}pt`;
    }

    function formatPointValue(value) {
      const yen = Math.max(0, Number(value) || 0);
      return `${yen.toLocaleString("ja-JP", { maximumFractionDigits: 2 })}円`;
    }

    function getRewardRate(card, category) {
      const rates = {
        tax: card.taxRewardRate,
        gasoline: card.gasolineRewardRate,
        etc: card.etcRewardRate
      };
      return toNumber(rates[category], card.rewardRate);
    }

    function categoryLabel(category) {
      const labels = {
        normal: "通常",
        tax: "税金",
        gasoline: "ガソリン",
        etc: "ETC",
        online: "通常",
        travel: "通常",
        business: "通常"
      };
      return labels[category] || "通常";
    }

    function formatYen(value) {
      const rounded = Math.round(value);
      return `${rounded.toLocaleString("ja-JP")}円`;
    }

    function toNumber(value, fallback) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function exportState() {
      const payload = JSON.stringify(state, null, 2);
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "card-picker-settings.json";
      link.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>

      }

      }
    }

</head>

      <section class="panel">
        <div class="panel-header">
          <h2 class="panel-title">今回の決済</h2>
        </div>
        <div class="panel-body">
          <div class="form-grid">
            <label>
              決済日

            </label>
            <label>
              金額
              <input id="amount" type="number" min="0" step="1" inputmode="numeric">
            </label>
            <label>

              <select id="category">
                <option value="normal">通常</option>
                <option value="tax">税金</option>
                <option value="gasoline">ガソリン</option>

        </div>

        const preset = cardPresets.find((item) => item.id === elements.presetSelect.value);
        if (!preset) {
          alert("追加するカードを選択してください。");
          return;
        }
        state.cards.push(cardFromPreset(preset));
        elements.presetSelect.value = "";
        render();
        saveState();
      });

      elements.addDefaultCardsButton.addEventListener("click", () => {
        const added = addDefaultCards();
        render();
        saveState();
        alert(added ? `${added}件の標準カードを追加しました。` : "標準カードはすでに入っています。");
      });

      elements.applyPresetsButton.addEventListener("click", () => {
        const applied = applyAllCardPresets();
        render();
        saveState();
        alert(applied ? `${applied}件のカードに公式情報を反映しました。` : "一致する公式プリセットがありませんでした。");
      });

      elements.exportButton.addEventListener("click", exportState);

      elements.importFile.addEventListener("change", async (event) => {
        const file = event.target.files[0];
        if (!file) return;
        const text = await file.text();
        const imported = JSON.parse(text);
        state = normalizeState(imported);
        render();
        saveState();
        elements.importFile.value = "";
      });

      elements.resetButton.addEventListener("click", () => {
        if (!confirm("カード設定と入力値を初期化しますか？")) return;
        localStorage.removeItem(STORAGE_KEY);
        state = normalizeState({});
        elements.txDate.value = toInputDate(new Date());
        elements.amount.value = 10000;
        elements.category.value = "normal";
        setPriorityMode("balanced");
        applyPriorityMode("balanced");
        render();
        saveState();
      });
    }

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        return normalizeState(saved);
      } catch {
        return normalizeState({});
      }
    }

    function normalizeState(input) {
      const cards = Array.isArray(input.cards) && input.cards.length ? input.cards : defaultCards;
      return {
        cards: cards.map((card) => ({
          id: card.id || crypto.randomUUID(),
          name: String(card.name || "カード"),
          closeDay: toNumber(card.closeDay, 31),
          payMonthOffset: toNumber(card.payMonthOffset, 1),
          payDay: toNumber(card.payDay, 27),
          pointValue: toNumber(card.pointValue, 1),
          rewardRate: toNumber(card.rewardRate, 1),
          taxRewardRate: toNumber(card.taxRewardRate, 0),
          gasolineRewardRate: toNumber(card.gasolineRewardRate, toNumber(card.rewardRate, 1)),
          etcRewardRate: toNumber(card.etcRewardRate, toNumber(card.rewardRate, 1)),
          taxFeeRate: toNumber(card.taxFeeRate, 0),
          limit: toNumber(card.limit, 0),
          used: toNumber(card.used, 0),
          memo: String(card.memo || "")
        }))
      };
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function applyRetiredCardMigration() {
      if (localStorage.getItem(RETIRED_CARDS_MIGRATION_KEY) === "done") return false;
      const before = state.cards.length;
      state.cards = state.cards.filter((card) => !isRetiredCardName(card.name));
      localStorage.setItem(RETIRED_CARDS_MIGRATION_KEY, "done");
      return state.cards.length !== before;
    }

    function isRetiredCardName(name) {
      const normalized = normalizeCardName(name);
      return retiredCardKeys.some((key) => normalized.includes(normalizeCardName(key)));
    }

    function renderPresetSelect() {
      elements.presetSelect.innerHTML = [
        '<option value="">カードを選択</option>',
        ...cardPresets.map((preset) => `<option value="${escapeAttr(preset.id)}">${escapeHtml(preset.label)}</option>`)
      ].join("");
    }

    function addDefaultCards() {
      const existing = new Set(state.cards.map((card) => normalizeCardName(card.name)));
      let added = 0;
      defaultCards.forEach((card) => {
        const key = normalizeCardName(card.name);
        if (existing.has(key)) return;
        state.cards.push(cloneCard(card));
        existing.add(key);
        added += 1;
      });
      return added;
    }

    function cardFromPreset(preset) {
      return {
        id: crypto.randomUUID(),
        name: preset.label,
        ...preset.values,
        taxFeeRate: 0.82,
        limit: 0,
        used: 0,
        memo: `自動補完: ${preset.note}`
      };
    }

    function cloneCard(card) {
      return {
        ...card,
        id: crypto.randomUUID()
      };
    }

    function render() {
      renderCards();
      renderResults();
    }

    function renderCards() {
      elements.cardList.innerHTML = "";
      if (!state.cards.length) {
        elements.cardList.innerHTML = '<div class="empty">カードがありません</div>';
        return;
      }

      state.cards.forEach((card) => {
        const editor = document.createElement("div");
        editor.className = "card-editor";
        editor.dataset.id = card.id;
        editor.innerHTML = `
          <label class="wide">カード名<input data-field="name" type="text" value="${escapeAttr(card.name)}"></label>
          <button class="icon-button delete-slot" data-action="delete" type="button" title="削除">×</button>
          <details class="card-details">
            <summary>
              <span>詳細設定</span>
              <span class="detail-meta">締め ${card.closeDay}日 / 支払 ${monthOffsetLabel(card.payMonthOffset)}${card.payDay}日 / 通常 ${formatPointRate(card.rewardRate)}</span>
            </summary>
            <div class="detail-grid">
              <label>締め日<select data-field="closeDay">${dayOptions(card.closeDay)}</select></label>
              <label>支払月<select data-field="payMonthOffset">${monthOffsetOptions(card.payMonthOffset)}</select></label>
              <label>支払日<select data-field="payDay">${dayOptions(card.payDay)}</select></label>
              <label>1pt円換算<input data-field="pointValue" type="number" step="0.1" min="0" value="${card.pointValue}"></label>
              <label>通常付与率<input data-field="rewardRate" type="number" step="0.01" min="0" value="${card.rewardRate}"></label>
              <label>税金付与率<input data-field="taxRewardRate" type="number" step="0.01" min="0" value="${card.taxRewardRate}"></label>
              <label>ガソリン付与率<input data-field="gasolineRewardRate" type="number" step="0.01" min="0" value="${card.gasolineRewardRate}"></label>
              <label>ETC付与率<input data-field="etcRewardRate" type="number" step="0.01" min="0" value="${card.etcRewardRate}"></label>
              <label>税金手数料(%)<input data-field="taxFeeRate" type="number" step="0.01" min="0" value="${card.taxFeeRate}"></label>
              <label>利用枠(円)<input data-field="limit" type="number" step="1000" min="0" value="${card.limit}"></label>
              <label>利用済(円)<input data-field="used" type="number" step="1000" min="0" value="${card.used}"></label>
              <div class="preset-note hidden" data-preset-note></div>
              <textarea data-field="memo" placeholder="メモ">${escapeHtml(card.memo)}</textarea>
            </div>
          </details>
        `;
        updatePresetNote(editor, card.name);

        editor.addEventListener("input", (event) => {
          const field = event.target.dataset.field;
          if (!field) return;
          const target = state.cards.find((item) => item.id === card.id);
          if (!target) return;
          target[field] = event.target.type === "number" || event.target.tagName === "SELECT"
            ? toNumber(event.target.value, 0)
            : event.target.value;
          if (field === "name") {
            const preset = applyCardPreset(target);
            if (preset) {
              syncEditorInputs(editor, target);
            } else {
              updatePresetNote(editor, target.name);
            }
          }
          renderResults();
          saveState();
        });

        editor.addEventListener("click", (event) => {
          if (event.target.dataset.action !== "delete") return;
          state.cards = state.cards.filter((item) => item.id !== card.id);
          render();
          saveState();
        });

        elements.cardList.appendChild(editor);
      });
    }

    function applyCardPreset(card) {
      const preset = findCardPreset(card.name);
      if (!preset) return null;
      Object.assign(card, preset.values);
      if (!card.memo.trim() || card.memo.startsWith("自動補完:")) {
        card.memo = `自動補完: ${preset.note}`;
      }
      return preset;
    }

    function applyAllCardPresets() {
      let applied = 0;
      state.cards.forEach((card) => {
        if (applyCardPreset(card)) {
          applied += 1;
        }
      });
      return applied;
    }

    function findCardPreset(name) {
      const normalized = normalizeCardName(name);
      return cardPresets.find((preset) => {
        return [preset.label, ...preset.aliases].some((alias) => normalized.includes(normalizeCardName(alias)));
      }) || null;
    }

    function normalizeCardName(name) {
      return String(name || "")
        .normalize("NFKC")
        .toLowerCase()
        .replace(/[・\s　_-]+/g, "");
    }

    function syncEditorInputs(editor, card) {
      editor.querySelectorAll("[data-field]").forEach((input) => {
        const field = input.dataset.field;
        if (!(field in card)) return;
        input.value = card[field];
      });
      updatePresetNote(editor, card.name);
    }

    function updatePresetNote(editor, name) {
      const note = editor.querySelector("[data-preset-note]");
      if (!note) return;
      const preset = findCardPreset(name);
      if (!preset) {
        note.classList.add("hidden");
        note.textContent = "";
        return;
      }
      note.textContent = `${preset.label}: ${preset.note}`;
      note.classList.remove("hidden");
    }

    function renderResults() {
      elements.cashWeightOutput.textContent = elements.cashWeight.value;
      elements.benefitWeightOutput.textContent = elements.benefitWeight.value;

      const tx = getTransaction();
      const ranked = rankCards(tx);
      renderSummary(ranked, tx);

      elements.results.innerHTML = "";
      if (!ranked.length) {
        elements.results.innerHTML = '<div class="empty">カードを追加してください</div>';
        return;
      }

      ranked.forEach((item, index) => {
        const node = document.createElement("article");
        node.className = `result-card ${index === 0 && item.available ? "best" : ""}`;
        const taxTag = tx.category === "tax"
          ? `<span class="tag ${item.netBenefit >= 0 ? "green" : "red"}">税金 ${formatYen(item.netBenefit)}</span>`
          : "";
        const limitTag = item.available
          ? `<span class="tag green">利用可</span>`
          : `<span class="tag red">枠不足</span>`;
        node.innerHTML = `
          <div class="rank">${index + 1}</div>
          <div class="result-main">
            <p class="result-title">
              <span>${escapeHtml(item.card.name)}</span>
              ${index === 0 && item.available ? '<span class="tag gold">最有力</span>' : ""}
              ${limitTag}
              ${taxTag}
            </p>
            <div class="facts">
              <span>締め日 ${formatDate(item.closeDate)}</span>
              <span>支払日 ${formatDate(item.paymentDate)}</span>
              <span>決済日から${item.daysUntilPayment}日後</span>
              <span>${categoryLabel(tx.category)}付与率 ${formatPointRate(item.rewardRate)}</span>
              <span>1pt=${formatPointValue(item.pointValue)}</span>
              <span>獲得見込 ${formatPoints(item.pointsEarned)}</span>
              <span>還元 ${formatYen(item.rewardValue)}</span>
              <span>残枠 ${item.remainingLabel}</span>
            </div>
          </div>
          <div class="days-hero" aria-label="支払いまで${item.daysUntilPayment}日">
            <small>支払いまで</small>
            <strong><span class="days-number">${item.daysUntilPayment}</span><span class="days-unit">日</span></strong>
            <span>${formatDate(item.paymentDate)}予定</span>
          </div>
          <div class="score">
            <strong>${item.available ? Math.round(item.score) : "-"}</strong>
            <small>score</small>
          </div>
        `;
        elements.results.appendChild(node);
      });
    }

    function applyPriorityMode(mode) {
      const modes = {
        points: { cash: 20, benefit: 80 },
        balanced: { cash: 50, benefit: 50 },
        days: { cash: 80, benefit: 20 }
      };
      const weights = modes[mode];
      if (!weights) return;
      elements.cashWeight.value = weights.cash;
      elements.benefitWeight.value = weights.benefit;
      setPriorityMode(mode);
    }

    function setPriorityMode(mode) {
      const checked = elements.priorityMode.querySelector(`input[value="${mode}"]`);
      if (checked) {
        checked.checked = true;
        return;
      }
      elements.priorityMode.querySelectorAll("input").forEach((input) => {
        input.checked = false;
      });
    }

    function renderSummary(ranked, tx) {
      const best = ranked.find((item) => item.available) || ranked[0];
      if (!best) {
        elements.summaryStrip.innerHTML = "";
        return;
      }
      elements.summaryStrip.innerHTML = `
        <div class="metric"><small>候補</small><strong>${escapeHtml(best.card.name)}</strong></div>
        <div class="metric"><small>支払予定日</small><strong>${formatLongDate(best.paymentDate)}</strong></div>
        <div class="metric"><small>支払いまで</small><strong>${best.daysUntilPayment}日</strong></div>
        <div class="metric"><small>獲得見込</small><strong>${formatPoints(best.pointsEarned)}</strong></div>
        <div class="metric"><small>${tx.category === "tax" ? "税金実質" : "還元見込み"}</small><strong>${formatYen(tx.category === "tax" ? best.netBenefit : best.rewardValue)}</strong></div>
      `;
    }

    function getTransaction() {
      const amount = Math.max(0, toNumber(elements.amount.value, 0));
      return {
        date: parseInputDate(elements.txDate.value) || new Date(),
        amount,
        category: elements.category.value,
        cashWeight: toNumber(elements.cashWeight.value, 50),
        benefitWeight: toNumber(elements.benefitWeight.value, 50)
      };
    }

    function rankCards(tx) {
      const rows = state.cards.map((card) => {
        const closeDate = getCloseDate(tx.date, card.closeDay);
        const paymentDate = getPaymentDate(closeDate, card.payMonthOffset, card.payDay);
        const daysUntilPayment = Math.max(0, daysBetween(tx.date, paymentDate));
        const rate = getRewardRate(card, tx.category);
        const pointValue = Math.max(0, toNumber(card.pointValue, 1));
        const pointsEarned = tx.amount * (rate / 100);
        const rewardValue = pointsEarned * pointValue;
        const fee = tx.category === "tax" ? tx.amount * (card.taxFeeRate / 100) : 0;
        const netBenefit = rewardValue - fee;
        const remaining = card.limit > 0 ? card.limit - card.used - tx.amount : Infinity;
        const available = card.limit <= 0 || remaining >= 0;
        return {
          card,
          closeDate,
          paymentDate,
          daysUntilPayment,
          rewardRate: rate,
          pointValue,
          pointsEarned,
          rewardValue,
          fee,
          netBenefit,
          remaining,
          remainingLabel: Number.isFinite(remaining) ? formatYen(remaining) : "未設定",
          available
        };
      });

      const minDays = Math.min(...rows.map((row) => row.daysUntilPayment));
      const maxDays = Math.max(...rows.map((row) => row.daysUntilPayment));
      const minBenefit = Math.min(...rows.map((row) => row.netBenefit));
      const maxBenefit = Math.max(...rows.map((row) => row.netBenefit));
      const cashWeight = tx.cashWeight / 100;
      const benefitWeight = tx.benefitWeight / 100;
      const totalWeight = Math.max(0.01, cashWeight + benefitWeight);

      rows.forEach((row) => {
        const dayScore = normalize(row.daysUntilPayment, minDays, maxDays);
        const benefitScore = normalize(row.netBenefit, minBenefit, maxBenefit);
        const baseScore = ((dayScore * cashWeight) + (benefitScore * benefitWeight)) / totalWeight;
        row.score = row.available ? baseScore * 100 : -1;
      });

      return rows.sort((a, b) => {
        if (a.available !== b.available) return a.available ? -1 : 1;
        return b.score - a.score;
      });
    }

    function getCloseDate(date, closeDay) {
      const y = date.getFullYear();
      const m = date.getMonth();
      const current = dateAtDay(y, m, closeDay);
      if (stripTime(date) <= current) return current;
      return dateAtDay(y, m + 1, closeDay);
    }

    function getPaymentDate(closeDate, offset, payDay) {
      return dateAtDay(closeDate.getFullYear(), closeDate.getMonth() + offset, payDay);
    }

    function dateAtDay(year, monthIndex, day) {
      const base = new Date(year, monthIndex, 1);
      const last = new Date(base.getFullYear(), base.getMonth() + 1, 0).getDate();
      return new Date(base.getFullYear(), base.getMonth(), Math.min(Math.max(1, day), last));
    }

    function parseInputDate(value) {
      if (!value) return null;
      const [year, month, day] = value.split("-").map(Number);
      return new Date(year, month - 1, day);
    }

    function toInputDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }

    function stripTime(date) {
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function daysBetween(start, end) {
      const ms = stripTime(end) - stripTime(start);
      return Math.round(ms / 86400000);
    }

    function normalize(value, min, max) {
      if (!Number.isFinite(value)) return 0;
      if (max === min) return 1;
      return (value - min) / (max - min);
    }

    function dayOptions(selected) {
      const labels = Array.from({ length: 31 }, (_, index) => {
        const day = index + 1;
        const label = day === 31 ? "月末" : `${day}日`;
        return `<option value="${day}" ${Number(selected) === day ? "selected" : ""}>${label}</option>`;
      });
      return labels.join("");
    }

    function monthOffsetOptions(selected) {
      return [
        [0, "当月"],
        [1, "翌月"],
        [2, "翌々月"],
        [3, "3か月後"]
      ].map(([value, label]) => `<option value="${value}" ${Number(selected) === value ? "selected" : ""}>${label}</option>`).join("");
    }

    function monthOffsetLabel(value) {
      const labels = {
        0: "当月",
        1: "翌月",
        2: "翌々月",
        3: "3か月後"
      };
      return labels[Number(value)] || "翌月";
    }

    function formatDate(date) {
      return `${date.getMonth() + 1}/${date.getDate()}`;
    }

    function formatLongDate(date) {
      return `${date.getFullYear()}/${date.getMonth() + 1}/${date.getDate()}`;
    }

    function formatPointRate(value) {
      return `${Number(value).toLocaleString("ja-JP", { maximumFractionDigits: 2 })}pt/100円`;
    }

    function formatPoints(value) {
      const points = Math.max(0, Number(value) || 0);
      return `${points.toLocaleString("ja-JP", { maximumFractionDigits: 2 })}pt`;
    }

    function formatPointValue(value) {
      const yen = Math.max(0, Number(value) || 0);
      return `${yen.toLocaleString("ja-JP", { maximumFractionDigits: 2 })}円`;
    }

    function getRewardRate(card, category) {
      const rates = {
        tax: card.taxRewardRate,
        gasoline: card.gasolineRewardRate,
        etc: card.etcRewardRate
      };
      return toNumber(rates[category], card.rewardRate);
    }

    function categoryLabel(category) {
      const labels = {
        normal: "通常",
        tax: "税金",
        gasoline: "ガソリン",
        etc: "ETC",
        online: "通常",
        travel: "通常",
        business: "通常"
      };
      return labels[category] || "通常";
    }

    function formatYen(value) {
      const rounded = Math.round(value);
      return `${rounded.toLocaleString("ja-JP")}円`;
    }

    function toNumber(value, fallback) {
      const number = Number(value);
      return Number.isFinite(number) ? number : fallback;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function exportState() {
      const payload = JSON.stringify(state, null, 2);
      const blob = new Blob([payload], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "card-picker-settings.json";
      link.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
